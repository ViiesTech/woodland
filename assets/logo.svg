<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle with Gradient -->
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ade80;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Circle Background -->
  <circle cx="60" cy="60" r="58" fill="url(#logoGradient)" filter="url(#glow)"/>
  
  <!-- Tree Trunk -->
  <rect x="55" y="75" width="10" height="20" fill="#8b5a3c" rx="2"/>
  
  <!-- Tree Leaves - Main branches -->
  <path d="M 60 40 Q 40 50 35 65 Q 30 75 40 75 Q 35 70 40 65 Q 45 55 55 50 Z" fill="#22c55e" opacity="0.9"/>
  <path d="M 60 40 Q 80 50 85 65 Q 90 75 80 75 Q 85 70 80 65 Q 75 55 65 50 Z" fill="#22c55e" opacity="0.9"/>
  <path d="M 60 35 Q 45 40 42 55 Q 40 65 50 65 Q 45 60 48 55 Q 50 45 58 40 Z" fill="#4ade80" opacity="0.9"/>
  <path d="M 60 35 Q 75 40 78 55 Q 80 65 70 65 Q 75 60 72 55 Q 70 45 62 40 Z" fill="#4ade80" opacity="0.9"/>
  <path d="M 60 30 Q 50 32 48 45 Q 47 55 55 55 Q 50 50 52 45 Q 54 38 60 35 Z" fill="#86efac" opacity="0.9"/>
  <path d="M 60 30 Q 70 32 72 45 Q 73 55 65 55 Q 70 50 68 45 Q 66 38 60 35 Z" fill="#86efac" opacity="0.9"/>
  
  <!-- Center Star/Sparkle -->
  <circle cx="60" cy="45" r="3" fill="#fff" opacity="0.8"/>
  <circle cx="55" cy="50" r="2" fill="#fff" opacity="0.6"/>
  <circle cx="65" cy="50" r="2" fill="#fff" opacity="0.6"/>
</svg>

